<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Calculatrice</h1>

    <!-- Formulaire pour saisir une opération -->
    <form id="operation-form" method="post">
        <label for="operation">Choisissez une opération :</label>
        <select id="operation" name="operation" required>
            <option value="addition">Addition</option>
            <option value="subtraction">Soustraction</option>
            <option value="multiplication">Multiplication</option>
            <option value="division">Division</option>
        </select>
        <br>

        <label for="operand1">Opérande 1 :</label>
        <input type="number" id="operand1" name="operand1" required>
        <br>

        <label for="operand2">Opérande 2 :</label>
        <input type="number" id="operand2" name="operand2" required>
        <br>

        <button type="submit">Envoyer l'opération</button>
    </form>

    <!-- Affichage du résultat de la création -->
    <div id="operation-result"></div>

    <hr>

    <!-- Formulaire pour récupérer un résultat -->
    <form id="result-form">
        <label for="operation-id">ID de l'opération :</label>
        <input type="text" id="operation-id" name="operation-id" required>
        <br>

        <button type="submit">Récupérer le résultat</button>
    </form>

    <!-- Affichage du résultat -->
    <div id="result-output"></div>

    <script src="script.js"></script>
</body>
</html>
